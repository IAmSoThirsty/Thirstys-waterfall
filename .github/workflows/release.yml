name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., 1.0.0)'
        required: true
        type: string

permissions:
  contents: write
  packages: write

jobs:
  validate-release:
    name: Validate Release Metadata
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code and release history
      uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      with:
        fetch-depth: 0

    - name: Set up Python
      uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
      with:
        python-version: '3.11'

    - name: Resolve and authorize release version
      shell: bash
      run: |
        DEFAULT_BRANCH="${{ github.event.repository.default_branch }}"
        if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
          RELEASE_VERSION="${GITHUB_REF#refs/tags/v}"
        else
          RELEASE_VERSION="${{ github.event.inputs.version }}"
          if [[ "${GITHUB_REF}" != "refs/heads/${DEFAULT_BRANCH}" ]]; then
            echo "Manual releases must run from refs/heads/${DEFAULT_BRANCH}." >&2
            exit 1
          fi
        fi
        git fetch --no-tags origin "${DEFAULT_BRANCH}"
        if ! git merge-base --is-ancestor "${GITHUB_SHA}" "origin/${DEFAULT_BRANCH}"; then
          echo "Release commit ${GITHUB_SHA} is not contained in ${DEFAULT_BRANCH}." >&2
          exit 1
        fi
        echo "RELEASE_VERSION=${RELEASE_VERSION}" >> "${GITHUB_ENV}"

    - name: Verify coherent release metadata
      run: python scripts/verify_release_version.py --expected-version "${RELEASE_VERSION}"

  # Build and test before release
  pre-release-tests:
    name: Pre-Release Tests
    needs: validate-release
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ['3.10', '3.11']
    
    steps:
    - name: Checkout code
      uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
    
    - name: Set up Python
      uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
      with:
        python-version: ${{ matrix.python-version }}
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install -e ".[test,web]"
    
    - name: Run tests
      run: |
        python -m pytest -q --timeout=180 --timeout-method=thread --durations=25

  # Build packages
  build:
    name: Build Distribution
    needs: pre-release-tests
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      with:
        fetch-depth: 0
    
    - name: Set up Python
      uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
      with:
        python-version: '3.11'
    
    - name: Install build dependencies
      run: |
        python -m pip install --upgrade pip
        pip install --require-hashes -r requirements-build.lock
        pip install twine==6.2.0
    
    - name: Build source and wheel distributions reproducibly
      run: |
        python scripts/verify_reproducible_build.py --output-dir dist
    
    - name: Check distribution
      run: |
        twine check dist/*
    
    - name: Upload artifacts
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
      with:
        name: dist-packages
        path: dist/
        retention-days: 7

  # Build Docker images
  build-docker:
    name: Build Docker Image
    needs: pre-release-tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    
    steps:
    - name: Checkout code
      uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3
    
    - name: Extract version from tag
      id: version
      run: |
        if [[ "${{ github.ref }}" == refs/tags/* ]]; then
          VERSION=${GITHUB_REF#refs/tags/v}
        else
          VERSION="${{ github.event.inputs.version }}"
        fi
        echo "version=${VERSION}" >> $GITHUB_OUTPUT

    - name: Set image names
      id: image
      run: |
        REPO="${GITHUB_REPOSITORY,,}"
        echo "registry_image=ghcr.io/${REPO}" >> $GITHUB_OUTPUT

    - name: Set reproducible build timestamp
      id: source-date
      run: echo "epoch=$(git log -1 --pretty=%ct)" >> $GITHUB_OUTPUT
    
    - name: Build Docker image
      uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
      with:
        context: .
        push: false
        load: true
        tags: |
          thirstys-waterfall:latest
          thirstys-waterfall:${{ steps.version.outputs.version }}
          ${{ steps.image.outputs.registry_image }}:latest
          ${{ steps.image.outputs.registry_image }}:${{ steps.version.outputs.version }}
        build-args: |
          SOURCE_DATE_EPOCH=${{ steps.source-date.outputs.epoch }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
    
    - name: Test Docker image
      run: |
        python -m pip install --upgrade pip
        pip install --require-hashes -r requirements-build.lock
        pip install --require-hashes -r requirements-deploy.lock
        pip install -e ".[dev,test,web]"
        python scripts/verify_production_deployment.py --skip-tests --skip-docker-build --image thirstys-waterfall:${{ steps.version.outputs.version }}

    - name: Login to GHCR
      uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Push verified Docker image
      run: |
        IMAGE="${{ steps.image.outputs.registry_image }}"
        VERSION="${{ steps.version.outputs.version }}"
        docker push "${IMAGE}:${VERSION}"
        docker push "${IMAGE}:latest"
        DIGEST="$(docker buildx imagetools inspect "${IMAGE}:${VERSION}" --format '{{.Manifest.Digest}}')"
        if [[ ! "${DIGEST}" =~ ^sha256:[0-9a-f]{64}$ ]]; then
          echo "Published image did not return a valid immutable digest." >&2
          exit 1
        fi
        printf 'THIRSTYS_IMAGE=%s@%s\n' "${IMAGE}:${VERSION}" "${DIGEST}" > release.env
        python scripts/verify_release_version.py \
          --expected-version "${VERSION}" \
          --environment-example release.env
        docker buildx imagetools inspect "${IMAGE}:${VERSION}"

    - name: Upload immutable image metadata
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
      with:
        name: release-image-metadata
        path: release.env
        retention-days: 7

  # Create GitHub Release
  create-release:
    name: Create GitHub Release
    needs: [build, build-docker]
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      with:
        fetch-depth: 0
    
    - name: Download artifacts
      uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
      with:
        name: dist-packages
        path: dist/
    
    - name: Extract version and changelog
      id: extract
      run: |
        if [[ "${{ github.ref }}" == refs/tags/* ]]; then
          VERSION=${GITHUB_REF#refs/tags/v}
        else
          VERSION="${{ github.event.inputs.version }}"
        fi
        echo "version=${VERSION}" >> $GITHUB_OUTPUT
        
        # Extract changelog for this version if CHANGELOG.md exists
        if [ -f CHANGELOG.md ]; then
          # Get changelog section for this version
          awk -v ver="$VERSION" '/^## \[?'$VERSION'\]?/{flag=1; next} /^## \[?[0-9]/{flag=0} flag' CHANGELOG.md > release_notes.md || echo "Release version $VERSION" > release_notes.md
        else
          echo "Release version $VERSION" > release_notes.md
        fi
    
    - name: Create Release
      uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v3
      with:
        tag_name: v${{ steps.extract.outputs.version }}
        name: Release v${{ steps.extract.outputs.version }}
        body_path: release_notes.md
        draft: false
        prerelease: false
        files: |
          dist/*
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Publish to PyPI (optional - requires PyPI token)
  publish-pypi:
    name: Publish to PyPI
    needs: create-release
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    environment:
      name: pypi
      url: https://pypi.org/p/thirstys-waterfall
    
    steps:
    - name: Download artifacts
      uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
      with:
        name: dist-packages
        path: dist/
    
    - name: Publish to PyPI
      uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # release/v1
      with:
        user: __token__
        password: ${{ secrets.PYPI_API_TOKEN }}
