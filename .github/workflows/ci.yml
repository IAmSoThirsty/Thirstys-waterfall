name: CI - Security & Testing

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

# Minimal permissions for security
permissions:
  contents: read

jobs:
  # Test on multiple platforms
  test:
    name: Test on ${{ matrix.os }} - Python ${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ['3.10', '3.11']
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v5
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v6
      with:
        python-version: ${{ matrix.python-version }}
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install -e ".[test,web]"
    
    - name: Run unit tests
      run: |
        python -m pytest -q --timeout=180 --timeout-method=thread --durations=25
    
    - name: Test VPN backend availability
      run: |
        python -c "from thirstys_waterfall.vpn.backends import VPNBackendFactory; print('Available VPN backends:', VPNBackendFactory.get_available_backends())"
    
    - name: Test firewall backend availability
      run: |
        python -c "from thirstys_waterfall.firewalls.backends import FirewallBackendFactory; print('Available firewall backends:', FirewallBackendFactory.get_available_backends())"
  
  # Security testing
  security:
    name: Security Checks
    runs-on: ubuntu-latest
    permissions:
      contents: read
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v5
    
    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install -e ".[dev]"
    
    - name: Run Bandit security scanner
      run: |
        bandit -r thirstys_waterfall/ -f json -o bandit-report.json
        bandit -r thirstys_waterfall/
    
    - name: Check for vulnerable dependencies
      run: |
        safety check -r requirements-deploy.lock --json
    
    - name: Upload security reports
      uses: actions/upload-artifact@v7
      if: always()
      with:
        name: security-reports
        path: |
          bandit-report.json
        retention-days: 30
  
  # Code quality
  code-quality:
    name: Code Quality Checks
    runs-on: ubuntu-latest
    permissions:
      contents: read
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v5
    
    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install -e ".[dev,web]"
    
    - name: Run flake8
      run: |
        flake8 scripts/ thirstys_waterfall/ web/ tests/ --count --max-line-length=127 --statistics

    - name: Type-check production tooling
      run: mypy

  # Standard v3 local deployment verifier without running Docker containers
  standard-v3-local-verify:
    name: Standard v3 Local Verify
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
    - name: Checkout code
      uses: actions/checkout@v5

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements-deploy.lock
        pip install -e ".[dev,test,web]"

    - name: Run Standard v3 verifier without Docker containers
      run: |
        python scripts/verify_production_deployment.py --skip-docker

    - name: Validate production TLS proxy config
      run: |
        python scripts/verify_production_proxy_config.py --compose-file docker-compose.production.yml --caddyfile deploy/caddy/Caddyfile
  
  # Platform-specific integration tests
  integration-linux:
    name: Integration Tests - Linux
    runs-on: ubuntu-latest
    permissions:
      contents: read
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v5
    
    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.11'
    
    - name: Install system dependencies (Linux)
      run: |
        sudo apt-get update
        # Note: Actual VPN/firewall tools would be installed here for real integration tests
        # sudo apt-get install -y wireguard-tools openvpn nftables
        echo "System dependencies would be installed here"
    
    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install -e ".[test,web]"
    
    - name: Run VPN backend tests
      run: |
        python -m pytest tests/test_vpn_backends.py -q
    
    - name: Run firewall backend tests
      run: |
        python -m pytest tests/test_firewall_backends.py -q
    
    - name: Test nftables backend
      run: |
        python -c "from thirstys_waterfall.firewalls.backends import NftablesBackend; b = NftablesBackend({}); print('nftables available:', b.check_availability())"
  
  integration-windows:
    name: Integration Tests - Windows
    runs-on: windows-latest
    permissions:
      contents: read
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v5
    
    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.11'
    
    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install -e ".[test,web]"
    
    - name: Run VPN backend tests
      run: |
        python -m pytest tests/test_vpn_backends.py -q
    
    - name: Run firewall backend tests
      run: |
        python -m pytest tests/test_firewall_backends.py -q
    
    - name: Test Windows Firewall backend
      run: |
        python -c "from thirstys_waterfall.firewalls.backends import WindowsFirewallBackend; b = WindowsFirewallBackend({}); print('Windows Firewall available:', b.check_availability())"
  
  integration-macos:
    name: Integration Tests - macOS
    runs-on: macos-latest
    permissions:
      contents: read
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v5
    
    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.11'
    
    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install -e ".[test,web]"
    
    - name: Run VPN backend tests
      run: |
        python -m pytest tests/test_vpn_backends.py -q
    
    - name: Run firewall backend tests
      run: |
        python -m pytest tests/test_firewall_backends.py -q
    
    - name: Test PF backend
      run: |
        python -c "from thirstys_waterfall.firewalls.backends import PFBackend; b = PFBackend({}); print('PF available:', b.check_availability())"
  
  # Build and package
  build:
    name: Build Package
    runs-on: ubuntu-latest
    needs: [test, security, code-quality, standard-v3-local-verify]
    permissions:
      contents: read
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v5
    
    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.11'
    
    - name: Install build dependencies
      run: |
        python -m pip install --upgrade pip
        pip install build wheel setuptools
    
    - name: Build package
      run: |
        python -m build
    
    - name: Upload build artifacts
      uses: actions/upload-artifact@v7
      with:
        name: dist-packages
        path: dist/
        retention-days: 30
