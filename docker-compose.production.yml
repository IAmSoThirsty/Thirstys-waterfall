services:
  thirstys-waterfall:
    image: ${THIRSTYS_IMAGE:?THIRSTYS_IMAGE is required; pin the published digest}
    restart: unless-stopped
    command: ["bash", "/app/web/start.sh"]
    environment:
      - THIRSTYS_ENV=production
      - PYTHONUNBUFFERED=1
      - WORKERS=${WORKERS:-4}
      - WORKER_CLASS=gevent
      - DEBUG=false
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - WEB_HOST=0.0.0.0
      - WEB_PORT=8080
      - SECRET_KEY=${SECRET_KEY:?SECRET_KEY is required}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:?JWT_SECRET_KEY is required}
      - THIRSTYS_ADMIN_USERNAME=${THIRSTYS_ADMIN_USERNAME:?THIRSTYS_ADMIN_USERNAME is required}
      - THIRSTYS_ADMIN_PASSWORD_HASH=${THIRSTYS_ADMIN_PASSWORD_HASH:?THIRSTYS_ADMIN_PASSWORD_HASH is required}
      - THIRSTYS_ALLOW_DEMO_LOGIN=false
      - JWT_REVOCATION_DB_PATH=/home/thirsty/.thirstys_waterfall/revoked_tokens.sqlite3
      - CORS_ORIGINS=https://${THIRSTYS_PUBLIC_HOST:?THIRSTYS_PUBLIC_HOST is required}
    expose:
      - "8080"
    volumes:
      - thirstys_data:/home/thirsty/.thirstys_waterfall
      - ./config:/app/config:ro
    networks:
      - thirstys_private
    security_opt:
      - no-new-privileges:true
    cap_add:
      - NET_ADMIN
      - NET_RAW
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 2G
        reservations:
          cpus: "0.5"
          memory: 512M
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8080/health')",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  caddy:
    image: caddy:2.10-alpine@sha256:4c6e91c6ed0e2fa03efd5b44747b625fec79bc9cd06ac5235a779726618e530d
    restart: unless-stopped
    depends_on:
      thirstys-waterfall:
        condition: service_healthy
    environment:
      - THIRSTYS_PUBLIC_HOST=${THIRSTYS_PUBLIC_HOST:?THIRSTYS_PUBLIC_HOST is required}
      - CADDY_ACME_EMAIL=${CADDY_ACME_EMAIL:?CADDY_ACME_EMAIL is required}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - thirstys_private
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    healthcheck:
      test: ["CMD", "caddy", "version"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  thirstys_data:
    driver: local
  caddy_data:
    driver: local
  caddy_config:
    driver: local

networks:
  thirstys_private:
    driver: bridge
