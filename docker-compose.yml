services:
  thirstys-waterfall:
    build:
      context: .
      dockerfile: Dockerfile
    image: thirstys-waterfall:latest
    container_name: thirstys-waterfall
    restart: unless-stopped

    # Override default command to start web interface
    command: ["bash", "/app/web/start.sh"]

    # Environment variables
    environment:
      - THIRSTYS_ENV=production
      - PYTHONUNBUFFERED=1
      # Production server configuration
      - WORKERS=4
      - WORKER_CLASS=gevent
      - DEBUG=false
      - LOG_LEVEL=info
      - WEB_HOST=0.0.0.0
      - WEB_PORT=8080
      - SECRET_KEY=${SECRET_KEY:?SECRET_KEY is required}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:?JWT_SECRET_KEY is required}
      - THIRSTYS_ADMIN_USERNAME=${THIRSTYS_ADMIN_USERNAME:?THIRSTYS_ADMIN_USERNAME is required}
      - THIRSTYS_ADMIN_PASSWORD_HASH=${THIRSTYS_ADMIN_PASSWORD_HASH:?THIRSTYS_ADMIN_PASSWORD_HASH is required}
      - THIRSTYS_ALLOW_DEMO_LOGIN=false
      - JWT_REVOCATION_DB_PATH=/home/thirsty/.thirstys_waterfall/revoked_tokens.sqlite3
      - CORS_ORIGINS=${CORS_ORIGINS:?CORS_ORIGINS is required}

    # Environment file for secrets
    env_file:
      - path: .env
        required: false

    # Volumes for persistent data and read-only configuration
    volumes:
      - thirstys_data:/home/thirsty/.thirstys_waterfall
      - ./config:/app/config:ro

    # Network configuration
    networks:
      - thirstys_network

    # Port mapping (if web interface is added)
    ports:
      - "8080:8080"

    # Security options
    security_opt:
      - no-new-privileges:true

    # Resource limits
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 2G
        reservations:
          cpus: "0.5"
          memory: 512M

    # Capabilities (for VPN and firewall functionality)
    cap_add:
      - NET_ADMIN
      - NET_RAW

    # Health check
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8080/health')",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

# Named volumes
volumes:
  thirstys_data:
    driver: local

# Networks
networks:
  thirstys_network:
    driver: bridge
